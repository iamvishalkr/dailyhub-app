name: Production Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to also trigger it manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm" # Caches node_modules automatically

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: "gradle" # Caches Gradle dependencies to cut build time in half

      - name: Expo prebuild
        run: npx expo prebuild --platform android --non-interactive

      - name: Decode and Inject Keystore
        run: |
          # 1. Decode the binary keystore file into the app folder
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore

          # 2. Inject environment variables directly into gradle.properties
          echo "MYAPP_RELEASE_STORE_FILE=my-release-key.keystore" >> android/gradle.properties
          echo "MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/gradle.properties

      - name: Configure Gradle Signing Configs
        run: |
          # This script safely injects the release signing configuration into the build.gradle file generated by Expo
          sed -i '/signingConfigs {/a \
                  release {\
                      if (project.hasProperty("MYAPP_RELEASE_STORE_FILE")) {\
                          storeFile file(MYAPP_RELEASE_STORE_FILE)\
                          storePassword MYAPP_RELEASE_STORE_PASSWORD\
                          keyAlias MYAPP_RELEASE_KEY_ALIAS\
                          keyPassword MYAPP_RELEASE_KEY_PASSWORD\
                      }\
                  }' android/app/build.gradle

          # Map the release buildType to use the newly added release signing configuration
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' android/app/build.gradle

      - name: Build production release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: production-apk
          path: android/app/build/outputs/apk/release/app-release.apk
